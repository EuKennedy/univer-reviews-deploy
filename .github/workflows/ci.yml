name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicit read-only token. The default token scope was sufficient before,
# but locking it down avoids surprises when forks send PRs and matches the
# GitHub-recommended default for CI workflows.
permissions:
  contents: read

jobs:
  # ─── Path filter ────────────────────────────────────────────────────────────
  # Computes per-area change flags so downstream jobs can skip themselves
  # when the affected paths weren't touched. CI stays fast on docs-only
  # PRs without sacrificing coverage on functional changes.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      api:    ${{ steps.filter.outputs.api }}
      admin:  ${{ steps.filter.outputs.admin }}
      widget: ${{ steps.filter.outputs.widget }}
      wp:     ${{ steps.filter.outputs.wp }}
      shared: ${{ steps.filter.outputs.shared }}
      ci:     ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - '.github/workflows/**'
            admin:
              - 'apps/admin/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
            widget:
              - 'apps/widget/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
            wp:
              - 'plugins/wordpress/**'
              - '.github/workflows/**'
            shared:
              - 'packages/shared/**'
            ci:
              - '.github/workflows/**'

  # ─── Secret scanning (gitleaks) ────────────────────────────────────────────
  # Catches leaked .env values, API keys, private keys committed by mistake.
  # Runs on every PR and every push to main. Hard fail — a leaked secret
  # can't be fixed by deleting the commit, the value must be rotated.
  gitleaks:
    name: Security · gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can scan every commit on the PR diff.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free open-source repos don't need a GITLEAKS_LICENSE; for
          # private repos add it as a secret to silence the EULA banner.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ─── Semgrep · TS/JS SAST ──────────────────────────────────────────────────
  # Static analysis for the admin + widget TS code. Catches eval, XSS sinks,
  # leaked tokens in env, insecure CORS, etc. Brakeman handles Ruby; this
  # job covers the rest. Uses Semgrep's open-source default rulesets.
  semgrep:
    name: Security · Semgrep (TS/JS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.admin == 'true' || needs.changes.outputs.widget == 'true' || needs.changes.outputs.ci == 'true'

    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        # `p/typescript p/javascript p/security-audit p/owasp-top-ten`
        # is the canonical "give me everything that matters for a JS web
        # app" bundle. `semgrep scan --error` exits non-zero on findings.
        # `--exclude-rule` silences specific rules whose entire pattern
        # is a documented false-positive for our render contracts:
        #
        #   • raw-html-format on widget.ts: every interpolation in our
        #     shadow-DOM template literals goes through escapeHtml().
        #     Semgrep can't statically prove that, so it fires for every
        #     <span>${escapeHtml(x)}</span>. We carry the design review
        #     as documentation; widget tests cover the render path.
        #   • echoed-request on class-admin.php: WP's paginate_links()
        #     returns sanitized HTML; surrounding $status_html is
        #     pre-escaped (comment in source).
        #   • avoid-redirect on tracking_controller: documented
        #     `nosemgrep:` annotation in source plus a paragraph
        #     explaining the email-click-tracker contract.
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --exclude apps/widget/dist \
            --exclude node_modules \
            --exclude .next \
            --exclude .turbo \
            --exclude-rule javascript.express.security.injection.raw-html-format.raw-html-format \
            --exclude-rule php.lang.security.injection.echoed-request.echoed-request \
            --error

  # ─── API ────────────────────────────────────────────────────────────────────
  api-rspec:
    name: API · RSpec + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: postgres
          POSTGRES_DB: univerreviews_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:ci@localhost:5432/univerreviews_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE: test-secret-key-base-do-not-use-in-prod-0000000000000000000000
      ANTHROPIC_API_KEY: test
      RESEND_API_KEY: test
      DISABLE_BOOTSNAP: "1"
      # Tells SimpleCov to run; rails_helper.rb checks this var. Set to
      # "false" locally if you want a snappier run without coverage.
      COVERAGE: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: Install pgvector + pgcrypto extensions on test DB
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d univerreviews_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run migrations
        working-directory: apps/api
        run: bundle exec rails db:migrate

      - name: Migration reversibility (CI_FULL only — slow)
        # Triggered when the commit message contains `[full ci]` or when
        # running on main. PR feedback stays fast; nightly + release
        # candidates exercise rollback/redo.
        working-directory: apps/api
        if: contains(github.event.head_commit.message, '[full ci]') || github.ref == 'refs/heads/main'
        env:
          CI_FULL: "1"
        run: bundle exec rspec spec/db/migration_reversibility_spec.rb --format documentation

      - name: RSpec (no --fail-fast — surface every regression in one pass)
        working-directory: apps/api
        run: bundle exec rspec --format documentation --profile 10

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-${{ github.run_id }}
          path: apps/api/coverage/
          retention-days: 14
          if-no-files-found: warn

  # ─── API · Rubocop (advisory) ──────────────────────────────────────────────
  api-rubocop:
    name: API · Rubocop (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: Rubocop
        working-directory: apps/api
        run: bundle exec rubocop --parallel --format github || true

  # ─── API · Brakeman ────────────────────────────────────────────────────────
  api-brakeman:
    name: API · Brakeman security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: Brakeman
        working-directory: apps/api
        run: bundle exec brakeman --no-pager --quiet --no-progress --exit-on-error

  # ─── API · Bundler-audit ───────────────────────────────────────────────────
  api-audit:
    name: API · bundler-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: bundler-audit
        working-directory: apps/api
        run: |
          bundle exec bundler-audit update
          bundle exec bundler-audit check --no-update

  # ─── Admin · TS + ESLint + Build ───────────────────────────────────────────
  admin-build:
    name: Admin · TS + ESLint + Next build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.admin == 'true' || needs.changes.outputs.ci == 'true'

    env:
      BETTER_AUTH_SECRET: dummy-32-chars-minimum-secret-aaaaaa

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: apps/admin
        run: pnpm exec tsc --noEmit

      - name: ESLint (only when admin has lint config)
        working-directory: apps/admin
        run: |
          if [ -f eslint.config.mjs ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ]; then
            pnpm exec next lint --max-warnings=0 || exit 1
          else
            echo "No ESLint config found — skipping."
          fi

      - name: Next build
        working-directory: apps/admin
        run: pnpm exec next build --no-lint

  # ─── Widget · TS + Rollup + Vitest + Budget + Diff ─────────────────────────
  widget-build:
    name: Widget · TS + Vitest + bundle + budget
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: changes
    if: needs.changes.outputs.widget == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so we can diff bundle size against main.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (strict, no emit)
        working-directory: apps/widget
        run: pnpm exec tsc --noEmit

      - name: Vitest (DOM + contract)
        working-directory: apps/widget
        # Coverage thresholds live in vitest.config.ts — under threshold
        # the run exits non-zero.
        run: pnpm exec vitest run --coverage

      - name: Upload widget coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget-coverage-${{ github.run_id }}
          path: apps/widget/coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Build widget
        working-directory: apps/widget
        run: pnpm run build

      - name: Verify bundle exists and stays under perf budget
        working-directory: apps/widget
        run: |
          if [ ! -f dist/widget.js ]; then
            echo "::error::dist/widget.js missing — build did not emit the bundle"
            exit 1
          fi
          raw=$(wc -c < dist/widget.js | tr -d ' ')
          gz=$(gzip -c dist/widget.js | wc -c | tr -d ' ')
          echo "widget.js raw=$raw bytes / gzipped=$gz bytes"
          # Budget: 92KB raw / 28KB gzipped. The widget ships TWO storefront
          # layouts (media carousel + topic stacks) plus the modal,
          # custom element, escapeHtml + i18n helpers, and the custom
          # brand-icon mask path.
          if [ "$raw" -ge 94208 ]; then
            echo "::error::widget.js is $raw bytes raw — exceeds 92KB budget"
            exit 1
          fi
          if [ "$gz" -ge 28672 ]; then
            echo "::error::widget.js is $gz bytes gzipped — exceeds 28KB transfer budget"
            exit 1
          fi
          # Persist for the diff step below.
          echo "$raw" > /tmp/widget-raw.txt
          echo "$gz"  > /tmp/widget-gz.txt

      - name: Bundle size diff vs main (PR only)
        if: github.event_name == 'pull_request'
        working-directory: apps/widget
        run: |
          set -e
          git fetch origin main --depth 1 || true
          if ! git rev-parse origin/main >/dev/null 2>&1; then
            echo "::warning::origin/main not available — skipping diff"
            exit 0
          fi
          mkdir -p /tmp/main-build && cd /tmp/main-build
          git --git-dir=$GITHUB_WORKSPACE/.git --work-tree=. checkout origin/main -- apps/widget
          cd apps/widget && pnpm install --frozen-lockfile --silent && pnpm run build
          main_raw=$(wc -c < dist/widget.js | tr -d ' ')
          main_gz=$(gzip -c dist/widget.js | wc -c | tr -d ' ')
          pr_raw=$(cat /tmp/widget-raw.txt)
          pr_gz=$(cat /tmp/widget-gz.txt)
          delta_raw=$((pr_raw - main_raw))
          delta_gz=$((pr_gz - main_gz))
          echo "## Widget bundle size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | main | PR | Δ |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Raw      | $main_raw | $pr_raw | $delta_raw |" >> $GITHUB_STEP_SUMMARY
          echo "| Gzipped  | $main_gz  | $pr_gz  | $delta_gz  |" >> $GITHUB_STEP_SUMMARY
          # Soft fail at +10% gzip growth so renegade refactors get a
          # second look before merging. The absolute budget above is the
          # hard wall.
          if [ "$delta_gz" -gt 2867 ]; then
            echo "::warning::Bundle grew by $delta_gz gzipped bytes (>10%)"
          fi
        continue-on-error: true

  # ─── WordPress plugin · PHP syntax lint ────────────────────────────────────
  wp-plugin-lint:
    name: WP plugin · PHP -l
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.wp == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: none

      - name: Lint every PHP file in the plugin
        run: |
          set -e
          found=0
          while IFS= read -r f; do
            found=1
            php -l "$f" || exit 1
          done < <(find plugins/wordpress -name "*.php" -not -path "*/node_modules/*")
          if [ "$found" -eq 0 ]; then
            echo "::error::No PHP files found under plugins/wordpress — check repo layout"
            exit 1
          fi

  # ─── Frontend dep audit ────────────────────────────────────────────────────
  frontend-audit:
    name: Frontend · pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.admin == 'true' || needs.changes.outputs.widget == 'true' || needs.changes.outputs.ci == 'true'

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit high-severity CVEs
        run: pnpm audit --prod --audit-level high

  # ─── Aggregate gate ────────────────────────────────────────────────────────
  # Single status check that branch protection can require. If any of the
  # gating jobs above failed (or was skipped because needs.changes filter
  # excluded it — that's fine, skipped is "success" for our purposes),
  # this job fails the run so PRs can't be merged.
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - semgrep
      - api-rspec
      - api-brakeman
      - api-audit
      - admin-build
      - widget-build
      - wp-plugin-lint
      - frontend-audit
    # Run even if needed jobs were skipped (path filter).
    if: always()
    steps:
      - name: Fail when any required job actually failed
        run: |
          # Map of result strings from every required job. `success` and
          # `skipped` are both acceptable — a job that didn't run because
          # the path filter excluded it isn't a failure. Cancelled/failed
          # is.
          results='${{ toJson(needs) }}'
          echo "Aggregated results: $results"
          if echo "$results" | grep -qE '"result":\s*"(failure|cancelled)"'; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed (or were skipped by path filter)."
