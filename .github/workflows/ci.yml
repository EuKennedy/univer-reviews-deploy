name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicit read-only token. The default token scope was sufficient before,
# but locking it down avoids surprises when forks send PRs and matches the
# GitHub-recommended default for CI workflows.
permissions:
  contents: read

jobs:
  # ─── API ────────────────────────────────────────────────────────────────────
  api-rspec:
    name: API · RSpec
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: postgres
          POSTGRES_DB: univerreviews_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:ci@localhost:5432/univerreviews_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE: test-secret-key-base-do-not-use-in-prod-0000000000000000000000
      ANTHROPIC_API_KEY: test
      RESEND_API_KEY: test
      DISABLE_BOOTSNAP: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: Install pgvector + pgcrypto extensions on test DB
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d univerreviews_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run migrations
        working-directory: apps/api
        run: bundle exec rails db:migrate

      - name: RSpec (no --fail-fast — surface every regression in one pass)
        working-directory: apps/api
        run: bundle exec rspec --format documentation

  # ─── API · Rubocop (advisory) ──────────────────────────────────────────────
  # Kept advisory so style nits don't block functional fixes. Brakeman +
  # rspec are the strict gatekeepers. Watch the annotations panel — the
  # `--format github` output adds inline PR comments without blocking merge.
  api-rubocop:
    name: API · Rubocop (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: Rubocop
        working-directory: apps/api
        run: bundle exec rubocop --parallel --format github || true

  # ─── API · Brakeman (security SAST) ────────────────────────────────────────
  api-brakeman:
    name: API · Brakeman security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: Brakeman
        working-directory: apps/api
        # `--no-pager` keeps output linear, `--quiet` drops the banner.
        # `--exit-on-error` fails on scan errors only (not on warnings yet)
        # so we start collecting findings without instantly blocking merges.
        # Promote to `--exit-on-warn` once existing baseline is clean.
        run: bundle exec brakeman --no-pager --quiet --no-progress --exit-on-error

  # ─── API · Bundler-audit (CVEs in Ruby deps) ───────────────────────────────
  api-audit:
    name: API · bundler-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/api

      - name: bundler-audit
        working-directory: apps/api
        run: |
          bundle exec bundler-audit update
          bundle exec bundler-audit check --no-update

  # ─── Admin · TS + Lint + Build ─────────────────────────────────────────────
  admin-build:
    name: Admin · TS + ESLint + Next build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BETTER_AUTH_SECRET: dummy-32-chars-minimum-secret-aaaaaa

    steps:
      - uses: actions/checkout@v5

      # pnpm version comes from the root package.json `packageManager` field
      # — passing `version:` here too would error with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: apps/admin
        run: pnpm exec tsc --noEmit

      - name: ESLint (only when admin has lint config)
        working-directory: apps/admin
        run: |
          if [ -f eslint.config.mjs ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ]; then
            pnpm exec next lint --max-warnings=0 || exit 1
          else
            echo "No ESLint config found — skipping."
          fi

      - name: Next build
        working-directory: apps/admin
        # Lint is run explicitly above so we keep `--no-lint` here to avoid
        # double-linting (and double cost).
        run: pnpm exec next build --no-lint

  # ─── Widget · Type-check + Bundle + Budget ─────────────────────────────────
  widget-build:
    name: Widget · TS + Rollup + perf budget
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      # setup-node@v5 auto-honors the root packageManager field via Corepack,
      # which means `npm install` in any sub-package fails with "pnpm not
      # found" unless pnpm is on PATH. Just use pnpm here too — the widget
      # workspace is a member of the monorepo's pnpm workspace anyway.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (strict, no emit)
        working-directory: apps/widget
        # The Rollup build uses the TS plugin in transpile mode which doesn't
        # surface type errors. Running tsc separately catches them before
        # they ship to a shadow DOM no one inspects.
        run: pnpm exec tsc --noEmit

      - name: Build widget
        working-directory: apps/widget
        run: pnpm run build

      - name: Verify bundle exists and stays under perf budget
        working-directory: apps/widget
        run: |
          if [ ! -f dist/widget.js ]; then
            echo "::error::dist/widget.js missing — build did not emit the bundle"
            exit 1
          fi
          raw=$(wc -c < dist/widget.js | tr -d ' ')
          gz=$(gzip -c dist/widget.js | wc -c | tr -d ' ')
          echo "widget.js raw=$raw bytes / gzipped=$gz bytes"
          # Budget: 92KB raw / 28KB gzipped. The widget ships TWO storefront
          # layouts (media carousel + topic stacks) plus the modal,
          # custom element, escapeHtml + i18n helpers, and the custom
          # brand-icon mask path. 28KB gzipped (real transfer) is still
          # well under Lighthouse "main-thread JS" limits.
          if [ "$raw" -ge 94208 ]; then
            echo "::error::widget.js is $raw bytes raw — exceeds 92KB budget"
            exit 1
          fi
          if [ "$gz" -ge 28672 ]; then
            echo "::error::widget.js is $gz bytes gzipped — exceeds 28KB transfer budget"
            exit 1
          fi

  # ─── WordPress plugin · PHP syntax lint ────────────────────────────────────
  wp-plugin-lint:
    name: WP plugin · PHP -l
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: none

      - name: Lint every PHP file in the plugin
        run: |
          set -e
          found=0
          while IFS= read -r f; do
            found=1
            php -l "$f" || exit 1
          done < <(find plugins/wordpress -name "*.php" -not -path "*/node_modules/*")
          if [ "$found" -eq 0 ]; then
            echo "::error::No PHP files found under plugins/wordpress — check repo layout"
            exit 1
          fi

  # ─── Frontend dep audit (npm audit via pnpm) ───────────────────────────────
  frontend-audit:
    name: Frontend · pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit high-severity CVEs
        # `pnpm audit --prod --audit-level high` fails the job on any HIGH
        # or CRITICAL CVE in the production tree. Dev-only deps are ignored
        # because they don't ship to customers. Set to `moderate` if we
        # want to be stricter.
        run: pnpm audit --prod --audit-level high
