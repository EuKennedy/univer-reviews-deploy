default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV['DATABASE_URL'] %>
  # Include auth schema so Better Auth tables (auth.user, auth.session, ...) are
  # visible to ActiveRecord without explicit schema qualification.
  schema_search_path: public,auth
  variables:
    statement_timeout: 30000

development:
  <<: *default
  database: univerreviews_development

test:
  <<: *default
  database: univerreviews_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
  pool: <%= ENV.fetch("DB_POOL") { ENV.fetch("RAILS_MAX_THREADS") { 10 } } %>
