<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniverReviews Widget — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb; color: #111827;
    }
    header {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 16px 32px; display: flex; align-items: center; gap: 24px;
      position: sticky; top: 0; z-index: 10;
    }
    h1 { font-size: 16px; font-weight: 700; }
    .controls { display: flex; gap: 8px; margin-left: auto; align-items: center; }
    .controls select, .controls input {
      padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 13px; background: #fff;
    }
    main { padding: 24px 16px; max-width: 1280px; margin: 0 auto; }
  </style>
</head>
<body>
  <header>
    <h1>UniverReviews Widget Demo</h1>
    <div class="controls">
      <select id="layout">
        <option value="default">Default (list)</option>
        <option value="grid" selected>Grid (4-col)</option>
        <option value="compact">Compact</option>
        <option value="carousel">Carousel</option>
      </select>
      <select id="locale">
        <option value="pt-BR">pt-BR</option>
        <option value="en-US">en-US</option>
      </select>
      <input id="theme" type="color" value="#d4a850" title="Theme color" />
    </div>
  </header>
  <main>
    <univer-reviews
      id="widget"
      workspace-id="demo"
      product-id="35247"
      api-url="https://api.univerreviews.com"
      layout="grid"
      locale="pt-BR"
      theme-color="#d4a850"
    ></univer-reviews>
  </main>
  <script src="dist/widget.js"></script>
  <script>
    const w = document.getElementById('widget')
    document.getElementById('layout').onchange = e => w.setAttribute('layout', e.target.value)
    document.getElementById('locale').onchange = e => w.setAttribute('locale', e.target.value)
    document.getElementById('theme').oninput = e => w.setAttribute('theme-color', e.target.value)
  </script>
</body>
</html>
